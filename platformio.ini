; PlatformIO Project Configuration File
; Camera Slider Controller - ESP32-C3 0.42" OLED board

[env:esp32c3_oled]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; ESP32-C3 native USB: route Serial to the USB CDC port
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Most C3 OLED boards need DIO flash mode
board_build.flash_mode = dio

; LittleFS filesystem for /data (web UI + wifi creds)
board_build.filesystem = littlefs

; Drop the linker .map file: its temp-file path breaks on this non-ASCII
; project path ("Yazılım") once the link command grows (WebSockets).
extra_scripts = post:strip_map.py

lib_deps =
    gin66/FastAccelStepper@^0.30.0
    bblanchon/ArduinoJson@^7.0.4
    olikraus/U8g2@^2.36.5
    links2004/WebSockets@^2.4.0
